<!DOCTYPE html>
<head>
    <title> position practise </title>
</head>
<body style=" height: 3000px;padding-top: 60px; padding-left: 70px;">
    <div style="
        background-color: black;
        color:aliceblue;
        position: fixed;
        top: 0px;
        left: 0px;
        right: 0px;
        height: 50px;
        z-index: 100;">
        header
          
        </div>
        <div 
        style=" background-color: green;
        position: fixed;
        color: white;
        top: 50px;
        width:70px;
        left: 0px;
        bottom:0;
        z-index: 100;">
          side bar 
                  <div style="
        background-color: rgb(196, 44, 44);
        position: absolute;
         color:white;
         left: 0px;
         right:0;
         top: 0;">
            x

        </div>

        </div>
        
        <div style="
        background-color: rgb(196, 44, 44);
        position: absolute;
         color:white;
         left: 500px;
         right: 10px;
         top: 10px;
         z-index: 110;">
            absolute

        </div>

    <div
     style="background-color: lightblue;
    height: 200px;
     width: 200px;
     position: static;">
        div 1
    </div>
    <div 
    style="background-color:
     lightgreen;height: 200px;
      width: 200px;
      position: relative;">
        div 2
         <div style="
        background-color: rgb(0, 0, 0);
        position: absolute;
         color:white;
         right: 10px;
         bottom: 10px;">
          
          17:23

        </div>
    </div>


</body>


</html>
