<!DOCTYPE html>
<html>
    <head>
        <title>youtube</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?
         family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"  
         rel="stylesheet">
        <style>
            p{
                font-family: Roboto,Arial, Helvetica, sans-serif;
                margin-top: 0;
                margin-bottom: 0;
            }
            .thumbnail{
                width:300px;
                display: block;

            }
            .search-bar{
                display: block;


            }

            .v-title{
                margin-top: 0;
                font-size: 14px;
                font-weight:bold;
                line-height: 18px;
            }
            .v-author{
                font-size: 12px;
                color: rgb(96,96,96);
                margin-bottom: 6px;
            }
            .v-stats{
                font-size: 12px;
                color: rgb(96,96,96);

            }
            .v-preview{
                width:300px;
                display: inline-block;
                vertical-align: top;
                margin-right: 15px;
            }
            .thumbnail-row{
                margin-bottom: 12px;
            }
            .ch-pic{
                display:inline-block ;
                width:50px;
                vertical-align: top;


            }
            .v-info{
                display: inline-block;
                width:200px;
            }
            .pfp{
                width: 45px;
                border-radius: 50%;
                vertical-align: top;
            }


        </style>
    </head>
    <body>
        <input class="search-bar"type="text" 
        placeholder="Search">

        <div class="v-preview">
            <div class="thumbnail-row"> <img class="thumbnail" 
            src="thumbnails/thumbnail-1.webp">
            </div>
            <div>
            <div class="ch-pic">
                <img class="pfp"src="channels/channel-1.jpeg">
            </div>
        
        <div class="v-info">  
            
            <p class="v-title">
             Talking Tech and AI with Google CEO 
             Sundar Pichai!
            </p>
            <p class="v-author">
              Marques Brownlee
         </p>
            <p class="v-stats">
              3.4M views · 6 months ago
            </p>
        </div>
        </div>
       </div>
      
         <div class="v-preview">
            <div class="thumbnail-row"> <img class="thumbnail" 
            src="thumbnails/thumbnail-2.webp">
            </div>
            <div>
            <div class="ch-pic">
                <img class="pfp"src="channels/channel-2.jpeg">
            </div>
        
        <div class="v-info">  
            
            <p class="v-title">
             Try Not To Laugh Challenge #9

            </p>
            <p class="v-author">
                Markiplier
              </p>
            <p class="v-stats">
            19M views · 4 years ago
            </p>
        </div>
       </div>
       </div>












    </body>



</html>
